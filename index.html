<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZConvert</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23667eea'><path d='M13 3L4 14h7l-2 7 9-11h-7l2-7z'/><circle cx='17' cy='17' r='4' fill='%237c3aed'/></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body id="pageBody">
    <div class="bg-glow"></div>

    <main id="app">
        <!-- Drop state -->
        <section class="state drop-state" id="dropState">
            <div class="center-content">
                <div class="brand">
                    <span class="brand-icon">⚡</span>
                    <span class="brand-text">EZConvert</span>
                </div>
                <div class="drop-message">
                    <div class="drop-emoji">📂</div>
                    <p class="drop-title">Drop a file here</p>
                    <p class="drop-hint">or <a href="#" id="browseLink">browse</a></p>
                </div>
                <div class="badge-row">
                    <span>🖼️ Images</span>
                    <span>📊 CSV/JSON</span>
                    <span>📝 Text</span>
                    <span>🎬 Video thumbnails</span>
                </div>
            </div>
        </section>

        <!-- File loaded state -->
        <section class="state file-state hidden" id="fileState">
            <div class="center-content">
                <div class="brand">
                    <span class="brand-icon">⚡</span>
                    <span class="brand-text">EZConvert</span>
                </div>
                <div class="file-card">
                    <div class="file-icon" id="fileIcon">📄</div>
                    <div class="file-meta">
                        <p class="file-name" id="fileName">—</p>
                        <p class="file-size" id="fileSize">—</p>
                    </div>
                    <button class="remove-btn" id="removeFile">×</button>
                </div>
                <div class="options-section" id="optionsSection">
                    <p class="options-label">Convert to</p>
                    <div class="option-grid" id="optionGrid"></div>
                    <div id="qualityRow"></div>
                </div>
                <button class="convert-btn hidden" id="convertBtn">
                    <span>Convert</span><span class="arrow">→</span>
                </button>
            </div>
        </section>

        <!-- Progress -->
        <section class="state progress-state hidden" id="progressState">
            <div class="center-content">
                <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                <p class="progress-text" id="progressText">Converting…</p>
            </div>
        </section>

        <!-- Result -->
        <section class="state result-state hidden" id="resultState">
            <div class="center-content">
                <div class="result-emoji">✅</div>
                <p class="result-title">Done!</p>
                <p class="result-meta" id="resultMeta"></p>
                <button class="download-btn" id="downloadBtn">⬇ Download</button>
                <button class="reset-btn" id="resetBtn">Convert another file</button>
            </div>
        </section>

        <!-- Error -->
        <section class="state error-state hidden" id="errorState">
            <div class="center-content">
                <div class="result-emoji">⚠️</div>
                <p class="result-title" style="color:#ef4444" id="errorTitle">Failed</p>
                <p class="result-meta" id="errorDetail"></p>
                <button class="reset-btn" id="errorResetBtn">Try again</button>
            </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
